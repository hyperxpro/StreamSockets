name: Rust Workspace CI

on:
  push:
    branches: [main, "rust-*"]
  pull_request:
    branches: [main]
  schedule:
    # Daily cargo audit + cargo deny refresh against the latest advisory DB.
    # A CVE landing Tuesday is caught Wednesday — not the following Monday
    # (which was the previous behavior under a weekly cron).
    - cron: "0 3 * * *"

# Default to the minimum permission a build needs. Per-job overrides may
# elevate where required (none currently).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHA per supply-chain hardening. Bump SHAs
      # together with the `# v<tag>` annotation; SHAs were resolved against
      # the upstream tag refs at pin time. `dtolnay/rust-toolchain` has no
      # release tags — pin to a branch HEAD SHA and re-pin on dep refresh.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # Pedantic group + allow-list lives in `Cargo.toml` `[workspace.lints.clippy]`.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build-test-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Pin the project's MSRV-floor toolchain explicitly (`1.86`) plus
        # current `stable`. Bumping MSRV requires updating both this matrix and
        # `rust-toolchain.toml`.
        toolchain: ["1.86", "stable"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.toolchain }}
      - name: Build
        run: cargo build --workspace --release --locked
      - name: Test
        run: cargo test --workspace --release --locked

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2
        with:
          command: check advisories bans licenses sources
