name: Rust Workspace CI

on:
  push:
    branches: [main, "rust-*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly cargo audit + cargo deny refresh against the latest advisory DB.
    - cron: "17 3 * * 1"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Pedantic group + allow-list lives in `Cargo.toml` `[workspace.lints.clippy]`.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build-test-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Pin the project's MSRV-floor toolchain explicitly (`1.86`) plus
        # current `stable`. Bumping MSRV requires updating both this matrix and
        # `rust-toolchain.toml`.
        toolchain: ["1.86", "stable"]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}
      - name: Build
        run: cargo build --workspace --release --locked
      - name: Test
        run: cargo test --workspace --release --locked

  build-test-aarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64
      - name: Install cross
        run: cargo install cross --locked --version 0.2.5
      - name: Cross build
        run: cross build --workspace --release --locked --target aarch64-unknown-linux-gnu

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
