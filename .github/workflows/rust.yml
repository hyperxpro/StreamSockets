name: Rust Workspace CI

on:
  push:
    branches: [main, "rust-*"]
  pull_request:
    branches: [main]
  schedule:
    # Daily cargo audit + cargo deny refresh against the latest advisory DB.
    # A CVE landing Tuesday is caught Wednesday — not the following Monday
    # (which was the previous behavior under a weekly cron).
    - cron: "0 3 * * *"

# Default to the minimum permission a build needs. Per-job overrides may
# elevate where required (none currently).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHA per supply-chain hardening. Bump SHAs
      # together with the `# v<tag>` annotation; SHAs were resolved against
      # the upstream tag refs at pin time. `dtolnay/rust-toolchain` has no
      # release tags — pin to a branch HEAD SHA and re-pin on dep refresh.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # Pedantic group + allow-list lives in `Cargo.toml` `[workspace.lints.clippy]`.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build-test-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Pin the project's MSRV-floor toolchain explicitly (`1.86`) plus
        # current `stable`. Bumping MSRV requires updating both this matrix and
        # `rust-toolchain.toml`.
        toolchain: ["1.86", "stable"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # branch: master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.toolchain }}
      - name: Build
        run: cargo build --workspace --release --locked
      - name: Test
        run: cargo test --workspace --release --locked

  build-test-aarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: aarch64
      - name: Install cross
        run: cargo install cross --locked --version 0.2.5
      - name: Cross build
        run: cross build --workspace --release --locked --target aarch64-unknown-linux-gnu
      # `cross test` runs the test binaries inside a QEMU-emulated aarch64
      # rootfs. QEMU does NOT emulate the io_uring syscall surface — any
      # uring-specific test would silently fall back to epoll without
      # exercising the io_uring code path. Set DISABLE_IOURING=true so the
      # runtime probe deterministically picks the epoll path under cross.
      # The native io_uring path is exercised by `build-test-linux` (x86_64
      # on a real kernel). The default `--features` set does not enable
      # `tokio-uring` today; if that changes, re-evaluate this comment.
      #
      # Tests that exercise `recvmsg(MSG_TRUNC)` + ancillary cmsg paths skip
      # themselves when `CROSS_RUNNER=qemu-user` (cross sets this on the
      # container automatically): qemu-aarch64-user mistranslates that
      # syscall surface — assertions misfire and the translator occasionally
      # SIGSEGVs. Coverage isn't lost; `build-test-linux` exercises those
      # paths on a real kernel.
      - name: Cross test
        env:
          DISABLE_IOURING: "true"
        run: cross test --workspace --release --locked --target aarch64-unknown-linux-gnu

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # branch: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@5bb39ff5d5a0e94dc9e2dc94eced0c6129743a57 # v2
        with:
          command: check advisories bans licenses sources
