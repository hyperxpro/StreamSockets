name: Docker Build & Push

on:
  push:
    tags:
      - "v2.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: docker/Dockerfile-Server
            image: hyperxpro/streamsockets
            tag_suffix: server
          - name: client
            dockerfile: docker/Dockerfile-Client
            image: hyperxpro/streamsockets
            tag_suffix: client
    steps:
      # Actions pinned to commit SHA per supply-chain hardening.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=2.1.0" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: buildx
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ matrix.image }}:${{ matrix.tag_suffix }}-${{ steps.ver.outputs.version }}
            ${{ matrix.image }}:${{ matrix.tag_suffix }}-latest
          provenance: true
          sbom: true
      - uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          subject-name: docker.io/${{ matrix.image }}
          subject-digest: ${{ steps.buildx.outputs.digest }}
          push-to-registry: true
