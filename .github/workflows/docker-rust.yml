name: Docker Build & Push (Rust 2.0.0)

on:
  push:
    tags:
      - "v2.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: docker/Dockerfile-Server-Rust
            image: hyperxpro/streamsockets
            tag_suffix: server
          - name: client
            dockerfile: docker/Dockerfile-Client-Rust
            image: hyperxpro/streamsockets
            tag_suffix: client
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=2.0.0-dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push
        uses: docker/build-push-action@v6
        id: buildx
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ matrix.image }}:${{ matrix.tag_suffix }}-${{ steps.ver.outputs.version }}
            ${{ matrix.image }}:${{ matrix.tag_suffix }}-latest
          provenance: true
          sbom: true
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-name: docker.io/${{ matrix.image }}
          subject-digest: ${{ steps.buildx.outputs.digest }}
          push-to-registry: true
