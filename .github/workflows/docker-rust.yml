name: Docker Build & Push (Rust 2.0.0)

on:
  push:
    tags:
      - "v2.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: docker/Dockerfile-Server-Rust
            image: hyperxpro/streamsockets
            tag_suffix: server
          - name: client
            dockerfile: docker/Dockerfile-Client-Rust
            image: hyperxpro/streamsockets
            tag_suffix: client
    steps:
      # Actions pinned to commit SHA per supply-chain hardening.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=2.0.0-dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: buildx
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ matrix.image }}:${{ matrix.tag_suffix }}-${{ steps.ver.outputs.version }}
            ${{ matrix.image }}:${{ matrix.tag_suffix }}-latest
          provenance: true
          sbom: true
      - uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-name: docker.io/${{ matrix.image }}
          subject-digest: ${{ steps.buildx.outputs.digest }}
          push-to-registry: true
